name: release

on:
  push:
    # run only against tags
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Go
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/go.tar.gz https://go.dev/dl/go1.26.0.linux-amd64.tar.gz
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf /tmp/go.tar.gz
          echo "/usr/local/go/bin" >> "${GITHUB_PATH}"
      - name: Show Go version
        run: go version
      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json
      - run: git fetch --force --tags
      - name: Build release archives
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          commit="$(git rev-parse --short HEAD)"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X main.Version=${version} -X main.Commit=${commit} -X main.BuildDate=${build_date}"

          mkdir -p dist
          platforms=(
            linux/amd64
            linux/arm64
            windows/amd64
            windows/arm64
            darwin/amd64
            darwin/arm64
            freebsd/amd64
            freebsd/arm64
          )

          for platform in "${platforms[@]}"; do
            goos="${platform%/*}"
            goarch="${platform#*/}"
            arch_name="${goarch}"
            if [ "${goarch}" = "arm64" ]; then
              arch_name="aarch64"
            fi

            package="CLIProxyAPI_${version}_${goos}_${arch_name}"
            workdir="dist/${package}"
            mkdir -p "${workdir}"

            binary="cli-proxy-api"
            if [ "${goos}" = "windows" ]; then
              binary="cli-proxy-api.exe"
            fi

            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
              go build -trimpath -ldflags="${ldflags}" -o "${workdir}/${binary}" ./cmd/server/

            cp LICENSE README.md README_CN.md config.example.yaml "${workdir}/"

            if [ "${goos}" = "windows" ]; then
              (cd dist && zip -qr "${package}.zip" "${package}")
            else
              tar -C dist -czf "dist/${package}.tar.gz" "${package}"
            fi

            rm -rf "${workdir}"
          done

          (cd dist && sha256sum *.tar.gz *.zip > checksums.txt)
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            dist/*.tar.gz \
            dist/*.zip \
            dist/checksums.txt \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Self-use CPA build based on CLIProxyAPI, with Codex/Responses compatibility fixes and management UI additions."
