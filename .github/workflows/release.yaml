name: release

on:
  push:
    tags:
      - "v*"
      - "selfuse-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag. Leave empty to create vX.Y.Z-selfuse.N from the current upstream base tag."
        required: false
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: false
        type: boolean
      draft:
        description: "Create release as draft"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve release tag
        id: release_tag
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          git fetch --force --tags https://github.com/router-for-me/CLIProxyAPI.git

          base_tag="$(
            git tag --merged HEAD --list 'v[0-9]*' \
              | grep -Ev 'selfuse|-' \
              | sort -V \
              | tail -n 1
          )"
          if [ -z "${base_tag}" ]; then
            base_tag="v0.0.0"
          fi

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            if [ -z "${tag}" ]; then
              last_selfuse=0
              while IFS= read -r existing_tag; do
                suffix="${existing_tag##${base_tag}-selfuse.}"
                if [[ "${suffix}" =~ ^[0-9]+$ ]] && [ "${suffix}" -gt "${last_selfuse}" ]; then
                  last_selfuse="${suffix}"
                fi
              done < <(git tag --list "${base_tag}-selfuse.*")
              tag="${base_tag}-selfuse.$((last_selfuse + 1))"
            fi
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              echo "Tag ${tag} already exists; release assets will be updated."
            else
              git tag "${tag}" "${GITHUB_SHA}"
              git push origin "refs/tags/${tag}"
            fi
          else
            tag="${GITHUB_REF_NAME}"
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "base_tag=${base_tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag}" >> "${GITHUB_ENV}"
      - name: Install Go
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/go.tar.gz https://go.dev/dl/go1.26.0.linux-amd64.tar.gz
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf /tmp/go.tar.gz
          echo "/usr/local/go/bin" >> "${GITHUB_PATH}"
      - name: Show Go version
        run: go version
      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json
      - run: git fetch --force --tags
      - name: Build release archives
        run: |
          set -euo pipefail

          version="${{ steps.release_tag.outputs.tag }}"
          commit="$(git rev-parse --short HEAD)"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X main.Version=${version} -X main.Commit=${commit} -X main.BuildDate=${build_date}"

          mkdir -p dist
          platforms=(
            linux/amd64
            linux/arm64
            windows/amd64
            windows/arm64
            darwin/amd64
            darwin/arm64
            freebsd/amd64
            freebsd/arm64
          )

          for platform in "${platforms[@]}"; do
            goos="${platform%/*}"
            goarch="${platform#*/}"
            arch_name="${goarch}"
            if [ "${goarch}" = "arm64" ]; then
              arch_name="aarch64"
            fi

            package="CLIProxyAPI_${version}_${goos}_${arch_name}"
            workdir="dist/${package}"
            mkdir -p "${workdir}"

            binary="cli-proxy-api"
            if [ "${goos}" = "windows" ]; then
              binary="cli-proxy-api.exe"
            fi

            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
              go build -trimpath -ldflags="${ldflags}" -o "${workdir}/${binary}" ./cmd/server/

            cp LICENSE README.md README_CN.md config.example.yaml "${workdir}/"

            if [ "${goos}" = "windows" ]; then
              (cd dist && zip -qr "${package}.zip" "${package}")
            else
              tar -C dist -czf "dist/${package}.tar.gz" "${package}"
            fi

            rm -rf "${workdir}"
          done

          (cd dist && sha256sum *.tar.gz *.zip > checksums.txt)
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.release_tag.outputs.tag }}"
          base_tag="${{ steps.release_tag.outputs.base_tag }}"
          args=(
            --repo "${GITHUB_REPOSITORY}"
            --title "${tag}"
            --notes "Self-use CPA build based on upstream CLIProxyAPI ${base_tag}, with Codex/Responses compatibility fixes and management UI additions."
          )
          if [ "${{ inputs.prerelease || false }}" = "true" ]; then
            args+=(--prerelease)
          fi
          if [ "${{ inputs.draft || false }}" = "true" ]; then
            args+=(--draft)
          fi

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/*.tar.gz dist/*.zip dist/checksums.txt --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${tag}" dist/*.tar.gz dist/*.zip dist/checksums.txt "${args[@]}"
          fi
